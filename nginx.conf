server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 关键：目录重定向用相对路径，避免把容器内监听端口(80)写进 Location
    # 这样浏览器会保留当前访问的 host:port（如宿主机映射的 10010）
    absolute_redirect off;
    port_in_redirect off;

    # /admin -> /admin/ 的目录重定向也要走相对路径
    # （上面 absolute_redirect off 已生效，这里显式处理确保 SPA 入口可达）
    location = /admin {
        return 301 /admin/;
    }

    # Admin panel (served at /admin/ subpath)
    location /admin/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /admin/index.html;
    }

    # API proxy to backend
    location /api {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 上传文件代理到后端
    location /uploads {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # User frontend SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
